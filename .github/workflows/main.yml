name: CI/CD Workflow

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ] 
  pull_request:
    branches: [ main ]

jobs:
  
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22' 
      - name: Run tests
        run: go test -v ./...

  
  build-and-push:
    needs: tests 
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          
          tags: |
            newdev777/parcel-tracker:latest
            newdev777/parcel-tracker:${{ github.ref_name }}
