name: CI/CD Workflow

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ] # Запуск при пуше тегов, начинающихся на v
  pull_request:
    branches: [ main ]

jobs:
  # 1. Job для тестирования
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21' # Укажи нужную версию Go

      - name: Run tests
        run: go test -v ./...

  # 2. Job для публикации в DockerHub
  build-and-push:
    needs: tests # Запускать только если тесты прошли
    if: startsWith(github.ref, 'refs/tags/') # Только если это пуш тега
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Тегирует образ твоим ником и версией из тега git
          tags: |
            null7user/parcel-tracker:latest
            null7user/parcel-tracker:${{ github.ref_name }}
